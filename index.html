<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheatstone Makerspace — Dashboard</title>
  <meta name="description" content="Live dashboard for the Wheatstone Makerspace at King's College London, Macadam Building, Strand Campus.">
  <link rel="stylesheet" href="css/style.css?v=1.1">
  <style>
    /* Prevent FOUC */
    .dashboard { opacity: 0; animation: fadeIn 0.5s ease 0.1s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- ===== HEADER ===== -->
    <header class="dashboard-header">
      <div class="header-brand">
        <a href="admin.html" class="logo-container" title="Admin Panel">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(50,50)">
              <circle cx="0" cy="0" r="12" fill="#a0a0b8"/>
              <rect x="-8" y="-38" width="16" height="16" rx="2" fill="#f0f0f5"/>
              <rect x="22" y="-8" width="16" height="16" rx="2" fill="#f0f0f5"/>
              <rect x="-8" y="22" width="16" height="16" rx="2" fill="#f0f0f5"/>
              <rect x="-38" y="-8" width="16" height="16" rx="2" fill="#f0f0f5"/>
              <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#a0a0b8" transform="translate(25,-25) rotate(45)"/>
              <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#a0a0b8" transform="translate(25,25) rotate(45)"/>
              <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#a0a0b8" transform="translate(-25,25) rotate(45)"/>
              <rect x="-6" y="-6" width="12" height="12" rx="2" fill="#a0a0b8" transform="translate(-25,-25) rotate(45)"/>
            </g>
          </svg>
        </a>
        <div class="lab-info">
          <div class="lab-name">Wheatstone Makerspace</div>
          <div class="lab-location">Macadam Building · Strand Campus</div>
        </div>
      </div>

      <div class="header-info">
        <div class="clock-container">
          <div class="clock-time" id="clock-time">00:00</div>
          <div class="clock-date" id="clock-date">Loading...</div>
        </div>
        <div class="weather-container">
          <div class="weather-current">
            <span class="weather-icon" id="weather-icon">🌡️</span>
            <span class="weather-temp" id="weather-temp">--°C</span>
            <span class="weather-desc" id="weather-desc"></span>
          </div>
          <div class="weather-forecast" id="weather-forecast"></div>
        </div>
      </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
      <!-- Side Panel (Left) -->
      <aside class="side-panel">
        <!-- Status Updates -->
        <div class="status-panel">
          <div class="panel-header">
            <span class="panel-title">Status Updates</span>
          </div>
          <div class="status-content" id="status-content">
            <div class="status-message" id="status-message">Loading...</div>
          </div>
          <div class="status-dots" id="status-dots"></div>
        </div>

        <!-- Upcoming Events -->
        <div class="events-panel">
          <div class="panel-header">
            <span class="panel-title">Upcoming Events</span>
          </div>
          <div class="events-list" id="events-list">
            <div class="event-empty">No upcoming events</div>
          </div>
        </div>
      </aside>

      <!-- Carousel (Right) -->
      <main class="carousel-container">
        <div id="carousel-slides"></div>
        <div class="carousel-indicators" id="carousel-dots"></div>
      </main>
    </div>

    <!-- ===== NEWS TICKER (BBC only) ===== -->
    <footer class="ticker-container">
      <div class="ticker-label">
        <div class="ticker-dot"></div>
        <span>BBC News</span>
      </div>
      <div class="ticker-track" id="ticker-track">
        <!-- Headlines will be injected here -->
      </div>
    </footer>
  </div>

  <script src="js/dashboard.js?v=1.1"></script>
</body>
</html>
